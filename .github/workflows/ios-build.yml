name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Pre-create module maps for Pod targets
        run: |
          cd ios
          # Get the build output directory before building
          BUILT_DIR=$(xcodebuild -workspace AssetTrack.xcworkspace -scheme AssetTrack -sdk iphoneos -configuration Release -showBuildSettings 2>/dev/null | grep "^[[:space:]]*BUILT_PRODUCTS_DIR" | sed 's/.*= //')
          echo "BUILT_PRODUCTS_DIR=$BUILT_DIR"

          if [ -z "$BUILT_DIR" ]; then
            echo "ERROR: Cannot determine BUILT_PRODUCTS_DIR"
            exit 1
          fi

          # Create stub module maps for pods that fail to generate them during build.
          # These are static frameworks with DEFINES_MODULE=YES (or CocoaPods
          # auto-generates them), but the xcframework build chain (ExpoModulesJSI->Expo->...)
          # can break under unsigned CI, preventing the module maps from appearing
          # in BUILT_PRODUCTS_DIR before the main target's Swift compilation needs them.
          # A stub (``framework module N {}``) is enough to satisfy Clang's module
          # resolver; the real module map is overlaid when the pod target completes.
          MODULES="EXConstants Expo ExpoAsset ExpoDomWebView ExpoKeepAwake ExpoLogBox RNScreens ExpoModulesJSI"
          for mod in $MODULES; do
            mkdir -p "$BUILT_DIR/$mod"
            MODULEMAP="$BUILT_DIR/$mod/$mod.modulemap"
            if [ ! -f "$MODULEMAP" ]; then
              echo "framework module $mod {}" > "$MODULEMAP"
              echo "Created stub: $MODULEMAP"
            fi
          done

          echo "BUILT_DIR=$BUILT_DIR" >> $GITHUB_ENV

      - name: Build .app bundle (unsigned)
        run: |
          set -o pipefail
          cd ios
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Ad-hoc sign and package IPA
        run: |
          echo "Searching for AssetTrack.app..."
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AssetTrack.app" -type d -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: AssetTrack.app not found"
            # Try without path filter
            APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AssetTrack.app" -type d 2>/dev/null | head -1)
            if [ -z "$APP" ]; then
              find ~/Library/Developer/Xcode/DerivedData -maxdepth 8 -name "*.app" -type d 2>/dev/null || true
              exit 1
            fi
          fi
          echo "Found .app at: $APP"
          echo "Signing with ad-hoc identity..."
          codesign --force --sign - --deep "$APP" 2>&1 || echo "Warning: codesign failed (non-fatal)"
          echo "Packaging IPA..."
          mkdir -p dist/Payload
          cp -r "$APP" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
