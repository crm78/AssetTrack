name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Fix ExpoModulesJSI for unsigned CI build
        run: |
          # Replace the real build-xcframework.sh with a stub that:
          # 1. Creates module.map in each xcframework slice (needed by Swift)
          # 2. Always exits 0 (the real script fails under CI because the
          #    nested xcodebuild can't sign, killing the entire build chain)
          SCRIPT="node_modules/expo-modules-jsi/apple/scripts/build-xcframework.sh"
          cp "$SCRIPT" "$SCRIPT.bak"
          cat > "$SCRIPT" << 'STUB'
#!/bin/bash
set -euo pipefail
PACKAGE_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")"/.. && pwd)"
XCFRAMEWORK_PATH="${PACKAGE_DIR}/Products/ExpoModulesJSI.xcframework"
for slice_dir in "$XCFRAMEWORK_PATH"/*/; do
  [ -d "$slice_dir" ] || continue
  framework_dir="${slice_dir}ExpoModulesJSI.framework"
  modules_dir="$framework_dir/Modules"
  mkdir -p "$modules_dir"
  echo 'framework module ExpoModulesJSI { export * }' > "$modules_dir/module.modulemap"
done
STUB
          chmod +x "$SCRIPT"
          echo "Replaced build-xcframework.sh with stub"

      - name: Pre-create stub module maps for remaining pods
        run: |
          cd ios
          BUILT_DIR=$(xcodebuild -workspace AssetTrack.xcworkspace -scheme AssetTrack -sdk iphoneos -configuration Release -showBuildSettings 2>/dev/null | grep "^[[:space:]]*BUILT_PRODUCTS_DIR" | sed 's/.*= //')
          if [ -z "$BUILT_DIR" ]; then
            echo "ERROR: Cannot determine BUILT_PRODUCTS_DIR"
            exit 1
          fi
          echo "BUILT_PRODUCTS_DIR=$BUILT_DIR"
          MODULES="EXConstants Expo ExpoAsset ExpoDomWebView ExpoKeepAwake ExpoLogBox RNScreens"
          for mod in $MODULES; do
            mkdir -p "$BUILT_DIR/$mod"
            MODULEMAP="$BUILT_DIR/$mod/$mod.modulemap"
            if [ ! -f "$MODULEMAP" ]; then
              echo "framework module $mod {}" > "$MODULEMAP"
            fi
          done
          echo "BUILT_DIR=$BUILT_DIR" >> $GITHUB_ENV

      - name: Build .app bundle (unsigned)
        run: |
          set -o pipefail
          cd ios
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Ad-hoc sign and package IPA
        run: |
          echo "Searching for AssetTrack.app..."
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AssetTrack.app" -type d -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AssetTrack.app" -type d 2>/dev/null | head -1)
            if [ -z "$APP" ]; then
              find ~/Library/Developer/Xcode/DerivedData -maxdepth 8 -name "*.app" -type d 2>/dev/null || true
              exit 1
            fi
          fi
          echo "Found .app at: $APP"
          codesign --force --sign - --deep "$APP" 2>&1 || echo "Warning: codesign failed (non-fatal)"
          mkdir -p dist/Payload
          cp -r "$APP" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
