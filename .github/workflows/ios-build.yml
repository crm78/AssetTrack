name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios

      - name: Build .app bundle (unsigned)
        run: |
          cd ios
          set -o pipefail
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=${{ runner.temp }}/build 2>&1 | tee xcodebuild.log
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "========== ERROR SUMMARY =========="
            grep -n -E "(error:|fatal error:|FAILED|Command [^ ]+ failed|clang: error|ld: error)" xcodebuild.log || echo "(no standard errors found, checking for other failure patterns...)"
            grep -n -E "(error|Error|ERROR)" xcodebuild.log | head -30 || true
            echo ""
            echo "========== LAST 50 LINES =========="
            tail -50 xcodebuild.log
            exit $EXIT_CODE
          fi

      - name: Package IPA
        run: |
          mkdir -p dist/Payload
          cp -r ${{ runner.temp }}/build/AssetTrack.app dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
