name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios

      - name: Patch ExpoModulesJSI xcframework build to no-op
        run: |
          cd ios
          find Pods -name "*.pbxproj" -exec sed -i '' 's/"Build ExpoModulesJSI xcframework"/"echo disabled"/' {} \; 2>/dev/null || true

      - name: Build .app bundle
        run: |
          cd ios
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=${{ runner.temp }}/build 2>&1 | tee xcodebuild.log
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== LAST 50 LINES ==="
            tail -50 xcodebuild.log
            echo "=== FAILED COMMANDS ==="
            grep -n "error:" xcodebuild.log | head -10 || true
            grep -B1 "failed" xcodebuild.log | grep -v "^--$" | head -10 || true
            exit $EXIT_CODE
          fi

      - name: Package IPA
        run: |
          mkdir -p dist/Payload
          cp -r ${{ runner.temp }}/build/AssetTrack.app dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
