name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Fix ExpoModulesJSI build for unsigned CI
        run: |
          # The build-xcframework.sh uses `env -i` which clears CODE_SIGNING_ALLOWED=NO
          # Add it so the nested xcodebuild doesn't try to code sign
          cd node_modules/expo-modules-jsi/apple/scripts
          cp build-xcframework.sh build-xcframework.sh.bak
          sed -i '' 's|env -i PATH="$PATH" HOME="$HOME" PODS_ROOT="$PODS_ROOT" RN_ROOT="$RN_ROOT" \\|env -i PATH="$PATH" HOME="$HOME" PODS_ROOT="$PODS_ROOT" RN_ROOT="$RN_ROOT" CODE_SIGNING_ALLOWED=NO \\|' build-xcframework.sh

      - name: Build .app bundle (unsigned)
        run: |
          set -o pipefail
          cd ios
          # First pass: build all Pod targets to generate their module maps
          echo "=== Building Pod module maps first ==="
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -only-target EXConstants \
            -only-target Expo \
            -only-target ExpoAsset \
            -only-target ExpoDomWebView \
            -only-target ExpoKeepAwake \
            -only-target ExpoLogBox \
            -only-target RNScreens \
            2>&1 | tee ${{ runner.temp }}/pods-build.log

          echo ""
          echo "=== Building full app ==="
          # Second pass: build everything including the main target
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Ad-hoc sign and package IPA
        run: |
          echo "Searching for AssetTrack.app..."
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AssetTrack.app" -type d -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: AssetTrack.app not found"
            find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          echo "Found .app at: $APP"
          echo "Signing with ad-hoc identity..."
          codesign --force --sign - --deep "$APP" 2>&1 || echo "Warning: codesign failed (non-fatal)"
          echo "Packaging IPA..."
          mkdir -p dist/Payload
          cp -r "$APP" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
