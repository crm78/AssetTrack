name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Patch ExpoModulesJSI xcframework build
        run: |
          cd ios
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*Build ExpoModulesJSI xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*ExpoModulesJSI.*xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true

      - name: Build archive (unsigned)
        run: |
          set -o pipefail
          cd ios
          SCHEME=$(xcodebuild -list -workspace AssetTrack.xcworkspace -json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['workspace']['schemes'][0])")
          echo "Scheme: $SCHEME"
          xcodebuild archive \
            -workspace AssetTrack.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ${{ runner.temp }}/AssetTrack.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Ad-hoc sign and package IPA
        run: |
          APP="${{ runner.temp }}/AssetTrack.xcarchive/Products/Applications/AssetTrack.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: .app not found at $APP"
            find ${{ runner.temp }}/AssetTrack.xcarchive -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          echo "Found .app at: $APP"
          echo "Signing with ad-hoc identity..."
          codesign --force --sign - --deep "$APP" 2>&1 || echo "Warning: codesign failed (non-fatal)"
          echo "Packaging IPA..."
          mkdir -p dist/Payload
          cp -r "$APP" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
