name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # CRITICAL: Upgrade Xcode to 16.2+ for Swift 6.3.1 compatibility.
      # macos-14 defaults to Xcode 15.x (Swift 6.1.2), which cannot build
      # Expo SDK modules compiled with Swift 6.3.1.
      - name: Switch to Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Verify Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install dependencies
        run: npm ci

      - name: Clean and regenerate iOS project
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Disable ExpoModulesJSI xcframework build script
        run: |
          find ios/Pods -name "*.pbxproj" \
            -exec sed -i '' \
              's/shellScript = "\(.*\)Build ExpoModulesJSI xcframework\(.*\)";/shellScript = "exit 0; \1Build ExpoModulesJSI xcframework\2";/' \
              {} \; 2>/dev/null || true
          echo "Patched ExpoModulesJSI build script phases with exit 0"

      - name: Archive .xcarchive (unsigned)
        run: |
          set -o pipefail
          cd ios
          xcodebuild archive \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ runner.temp }}/AssetTrack.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SKIP_INSTALL=NO \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Extract errors from build log
        if: failure()
        continue-on-error: true
        run: |
          echo "=== All error lines ==="
          grep -n "error:" ${{ runner.temp }}/xcodebuild.log | head -40 || echo "(no errors found in log)"
          echo ""
          echo "=== FAILURE summary ==="
          grep -n "BUILD FAILED\|The following build commands failed\|error:" ${{ runner.temp }}/xcodebuild.log | tail -20
          grep "error:" ${{ runner.temp }}/xcodebuild.log | head -50 > ${{ runner.temp }}/errors.txt

      - name: Package IPA from .xcarchive
        run: |
          XCARCHIVE="${{ runner.temp }}/AssetTrack.xcarchive"
          APP_PATH="${XCARCHIVE}/Products/Applications/AssetTrack.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            find "$XCARCHIVE" -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi

          echo "Found .app at: $APP_PATH"
          codesign --force --sign - --deep "$APP_PATH" 2>&1 || echo "Warning: codesign failed (non-fatal)"

          mkdir -p dist/Payload
          cp -r "$APP_PATH" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/
          echo "IPA created: $(pwd)/AssetTrack.ipa"

      - name: Upload build log and errors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ runner.temp }}/xcodebuild.log
            ${{ runner.temp }}/errors.txt

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
