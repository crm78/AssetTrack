name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Patch ExpoModulesJSI build script phase
        run: |
          cd ios
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*Build ExpoModulesJSI xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*ExpoModulesJSI.*xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true
          echo "Patched ExpoModulesJSI build script phase in pbxproj files"

      - name: Build .app bundle (unsigned)
        continue-on-error: true
        run: |
          set -o pipefail
          cd ios
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Extract Swift/compiler errors from build log
        if: always()
        run: |
          echo "=== Swift compilation errors ==="
          grep -n "error:" ${{ runner.temp }}/xcodebuild.log | grep -i "swift" | head -30 || echo "(no Swift errors found)"
          echo ""
          echo "=== All errors ==="
          grep -n "error:" ${{ runner.temp }}/xcodebuild.log | head -30 || echo "(no errors found)"
          echo ""
          echo "=== FAILED lines ==="
          grep -n "BUILD FAILED\|FAILED\|failed\|error:" ${{ runner.temp }}/xcodebuild.log | head -20 || echo "(no failure lines found)"

      - name: Check xcodebuild exit and continue if successful
        if: always()
        run: |
          if grep -q "BUILD SUCCEEDED" ${{ runner.temp }}/xcodebuild.log; then
            echo "BUILD SUCCEEDED - continuing packaging"
          else
            echo "BUILD FAILED - check errors above"
            exit 1
          fi

      - name: Ad-hoc sign and package IPA
        run: |
          echo "Searching for AssetTrack.app..."
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AssetTrack.app" -type d -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData -name "AssetTrack.app" -type d 2>/dev/null | head -1)
            if [ -z "$APP" ]; then
              find ~/Library/Developer/Xcode/DerivedData -maxdepth 8 -name "*.app" -type d 2>/dev/null || true
              exit 1
            fi
          fi
          echo "Found .app at: $APP"
          codesign --force --sign - --deep "$APP" 2>&1 || echo "Warning: codesign failed (non-fatal)"
          mkdir -p dist/Payload
          cp -r "$APP" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
