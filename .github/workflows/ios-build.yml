name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios

      - name: Build iOS archive (unsigned)
        run: |
          cd ios
          set -o pipefail
          xcodebuild archive \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            -archivePath ${{ runner.temp }}/AssetTrack.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee xcodebuild.log

          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "========== BUILD FAILED =========="
            echo "Last 100 lines:"
            tail -100 xcodebuild.log
            echo "========== ERROR LINES =========="
            grep -n "error:" xcodebuild.log | head -20 || true
            grep -n "fatal" xcodebuild.log | head -10 || true
            echo "========== COMMANDS FAILED =========="
            grep -B1 "failed" xcodebuild.log | tail -20 || true
            exit $EXIT_CODE
          fi

      - name: Package IPA
        run: |
          mkdir -p dist
          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/AssetTrack.xcarchive \
            -exportPath dist \
            -exportOptionsPlist /dev/stdin <<<'<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict><key>method</key><string>development</string><key>signingAllowed</key><false/></dict></plist>' 2>&1 || {
            echo "Export failed, trying manual packaging..."
            mkdir -p dist/Payload
            cp -r "${{ runner.temp }}/AssetTrack.xcarchive/Products/Applications/AssetTrack.app" dist/Payload/
            cd dist && zip -r AssetTrack.ipa Payload/
          }

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/*.ipa
