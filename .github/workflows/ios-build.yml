name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git fetch origin ${{ github.ref_name }}
          git checkout ${{ github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build .app bundle (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            CONFIGURATION_BUILD_DIR=${{ runner.temp }}/build

      - name: Package IPA
        run: |
          mkdir -p dist/Payload
          cp -r ${{ runner.temp }}/build/AssetTrack.app dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
