name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios

      - name: Patch ExpoModulesJSI xcframework build
        run: |
          cd ios
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*Build ExpoModulesJSI xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*ExpoModulesJSI.*xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true

      - name: Build .app bundle (unsigned)
        run: |
          set -o pipefail
          cd ios
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ${{ runner.temp }}/derivedData \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Locate and sign the .app
        run: |
          APP="${{ runner.temp }}/derivedData/Build/Products/Release-iphoneos/AssetTrack.app"
          if [ ! -d "$APP" ]; then
            echo "ERROR: $APP not found, searching..."
            find ${{ runner.temp }}/derivedData -name "AssetTrack.app" -type d 2>/dev/null
            ls -la ${{ runner.temp }}/derivedData/Build/Products/Release-iphoneos/ 2>/dev/null || true
            exit 1
          fi
          echo "Found .app at: $APP"
          echo "Signing with ad-hoc identity..."
          codesign --force --sign - --deep "$APP" 2>&1 || echo "Warning: codesign failed (non-fatal)"
          echo "APP_PATH=$APP" >> $GITHUB_ENV

      - name: Package IPA
        run: |
          mkdir -p dist/Payload
          cp -r "$APP_PATH" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
