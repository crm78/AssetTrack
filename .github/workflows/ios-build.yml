name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate iOS project and install Pods
        run: npx expo prebuild --platform ios

      - name: Patch ExpoModulesJSI xcframework build
        run: |
          cd ios
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*Build ExpoModulesJSI xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true
          find Pods -name "*.pbxproj" -exec sed -i '' 's/shellScript = ".*ExpoModulesJSI.*xcframework.*/shellScript = "echo patched"/' {} \; 2>/dev/null || true

      - name: Build .app bundle
        run: |
          cd ios
          xcodebuild \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            SYMROOT=${{ runner.temp }}/xcodebuild 2>&1 | tee xcodebuild.log
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== LAST 80 LINES ==="
            tail -80 xcodebuild.log
            echo "=== ERROR LINES ==="
            grep -n "error:" xcodebuild.log | head -20 || true
            grep -B1 "failed" xcodebuild.log | head -10 || true
            exit $EXIT_CODE
          fi

      - name: Package IPA
        run: |
          APP_PATH=$(find ${{ runner.temp }}/xcodebuild -name "*.app" -type d | grep -v "\.app\." | head -1)
          echo "App found at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in build output"
            find ${{ runner.temp }}/xcodebuild -type d -maxdepth 5 2>/dev/null | head -30
            exit 1
          fi
          mkdir -p dist/Payload
          cp -r "$APP_PATH" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
