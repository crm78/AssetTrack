name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean and regenerate iOS project
        run: |
          rm -rf ios
          npx expo prebuild --clean --platform ios --no-install

      - name: Install CocoaPods with verbose log
        run: |
          cd ios
          pod install --verbose

      - name: Disable ExpoModulesJSI xcframework build script
        run: |
          # Insert exit 0 at the top of build-xcframework.sh so it
          # always succeeds without doing any real work. The stub
          # xcframework created by pod install's prepare_command is
          # sufficient for an unsigned CI build.
          SCRIPT="node_modules/expo-modules-jsi/apple/scripts/build-xcframework.sh"
          if [ -f "$SCRIPT" ]; then
            sed -i '' '1s/^/exit 0\n/' "$SCRIPT"
            echo "Inserted exit 0 at top of $SCRIPT"
          else
            echo "ERROR: Script not found at $SCRIPT"
            exit 1
          fi

      - name: Archive .xcarchive (unsigned)
        run: |
          set -o pipefail
          cd ios
          xcodebuild archive \
            -workspace AssetTrack.xcworkspace \
            -scheme AssetTrack \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ${{ runner.temp }}/AssetTrack.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            2>&1 | tee ${{ runner.temp }}/xcodebuild.log

      - name: Extract errors from build log
        if: failure()
        run: |
          echo "=== Swift compilation errors ==="
          grep -n "error:" ${{ runner.temp }}/xcodebuild.log | grep -i "swift" | head -30 || echo "(no Swift errors found)"
          echo ""
          echo "=== All errors ==="
          grep -n "error:" ${{ runner.temp }}/xcodebuild.log | head -30 || echo "(no errors found)"
          echo ""
          echo "=== FAILED lines ==="
          grep -n "BUILD FAILED\|FAILED\|The following build commands failed" ${{ runner.temp }}/xcodebuild.log | head -10 || echo "(no failure lines found)"
          exit 1

      - name: Package IPA from .xcarchive
        run: |
          XCARCHIVE="${{ runner.temp }}/AssetTrack.xcarchive"
          APP_PATH="${XCARCHIVE}/Products/Applications/AssetTrack.app"
          echo "xcarchive: $XCARCHIVE"
          echo "app path: $APP_PATH"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: .app not found at $APP_PATH"
            echo "Contents of xcarchive:"
            find "$XCARCHIVE" -maxdepth 5 -type d 2>/dev/null || true
            exit 1
          fi

          echo "Found .app at: $APP_PATH"
          codesign --force --sign - --deep "$APP_PATH" 2>&1 || echo "Warning: codesign failed (non-fatal)"

          mkdir -p dist/Payload
          cp -r "$APP_PATH" dist/Payload/
          cd dist && zip -r AssetTrack.ipa Payload/
          echo "IPA created: $(pwd)/AssetTrack.ipa"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: ${{ runner.temp }}/xcodebuild.log

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AssetTrack-ipa
          path: dist/AssetTrack.ipa
